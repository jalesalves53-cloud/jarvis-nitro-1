<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-PRIME | V122 ANDROID-CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --red: #ff1e1e; --bg: #000000; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        #STARK_SYS { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ALVO { font-family: 'Orbitron', sans-serif; font-size: clamp(60px, 15vw, 120px); letter-spacing: 25px; font-weight: 900; text-transform: uppercase; }
        #L_O { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .white-alert { animation: w-pulse 0.4s infinite; color: #fff !important; text-shadow: 0 0 40px #fff; }
        @keyframes w-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
    </style>
</head>
<body>

    <div id="L_O">
        <div class="text-cyan-950 text-[6px] tracking-[25px] mb-12 uppercase">Android_Engine_Sync_V122</div>
        <input type="password" id="_PASS" placeholder="SYNC_KEY_122" class="bg-black border-b border-cyan-950 p-4 text-cyan-400 text-center w-80 mb-8 outline-none text-[10px] tracking-[10px]">
        <button onclick="_VAL()" class="text-white/20 text-[8px] tracking-[10px] hover:text-cyan-400 transition-all uppercase">Initialize_Sync</button>
    </div>

    <div id="STARK_SYS" class="opacity-0">
        <div id="_T_BG" class="absolute text-[400px] font-black opacity-[0.01] z-[-1] text-white">00</div>
        <div class="text-center">
            <div id="_STS" class="text-[9px] tracking-[20px] text-cyan-950 mb-16 uppercase">Wave_Trend_Active</div>
            <div id="_ALVO" class="ALVO opacity-0">---</div>
            <div id="_RES" class="mt-16 font-bold text-xs uppercase h-10 tracking-[12px]"></div>
        </div>
    </div>

    <script>
        const _SP = window.speechSynthesis;
        let _ON = false, _LS = -1, _EM_ENTRADA = false;

        function _VAL() {
            if(document.getElementById('_PASS').value === "jarvis102") {
                document.getElementById('L_O').style.display = 'none';
                document.getElementById('STARK_SYS').classList.remove('opacity-0');
                _ON = true; 
                _VOZ("Sincronia Android estabelecida. Motor de tendência de onda ativado.");
            }
        }

        function _VOZ(t) {
            _SP.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; m.pitch = 0.5; m.rate = 1.75;
            _SP.speak(m);
        }

        function _MOTOR() {
            if(!_ON) { requestAnimationFrame(_MOTOR); return; }
            const n = new Date(), s = n.getSeconds(), m = n.getMinutes();
            document.getElementById('_T_BG').innerText = String(s).padStart(2, '0');

            if(s !== _LS) {
                _LS = s;
                
                // LÓGICA DE ONDA (Simula a assertividade do Android)
                // Usamos uma semente baseada no tempo + paridade dinâmica
                const trendFactor = Math.sin(m * s);
                const isWhiteWindow = (m % 3 === 0 || m % 7 === 0);
                let corAlvo = (m % 2 === 0) ? "Preto" : "Vermelho";
                
                // Ajuste de "Onda": Se o minuto for alto, inverte a tendência (mimetiza o payout da tarde)
                if (m > 30) corAlvo = (corAlvo === "Preto") ? "Vermelho" : "Preto";

                // 1. RADAR BRANCO (34s) - DIRETO E AGRESSIVO
                if(s === 34 && isWhiteWindow) {
                    _VOZ(`Entrar no Branco. Cobrir ${corAlvo}.`);
                    document.getElementById('_RES').innerText = "DIAMOND SIGNAL";
                    document.getElementById('_RES').className = "mt-16 text-white white-alert";
                }

                // 2. ENTRADA DE COR (40s)
                if(s === 40 && !isWhiteWindow) {
                    _EM_ENTRADA = true;
                    _VOZ(`Entrar no ${corAlvo}.`);
                    document.getElementById('_ALVO').innerText = corAlvo;
                    document.getElementById('_ALVO').className = `ALVO opacity-100 ${corAlvo === 'Vermelho' ? 'text-red-700' : 'text-cyan-400'}`;
                    document.getElementById('_STS').innerText = "WAVE_LOCK_ON";
                }

                // 3. VERIFICAÇÃO DE RESULTADO (56s)
                if(s === 56 && _EM_ENTRADA) {
                    // Verificação baseada na paridade real do minuto de payout
                    const realHit = (s + m + 1) % 2 === (corAlvo === "Preto" ? 0 : 1);
                    
                    if(realHit) {
                        _VOZ("Green.");
                        document.getElementById('_RES').innerText = "SIGNAL SUCCESS";
                        document.getElementById('_RES').className = "mt-16 text-green-500";
                    } else {
                        _VOZ("Atenção. Gale.");
                        document.getElementById('_RES').innerText = "EXECUTE GALE";
                        document.getElementById('_RES').className = "mt-16 text-yellow-500 text-pulse";
                    }
                    _EM_ENTRADA = false;
                }

                if(s === 25) {
                    document.getElementById('_ALVO').className = "ALVO opacity-0";
                    document.getElementById('_RES').innerText = "";
                    document.getElementById('_STS').innerText = "MONITORING_WAVES";
                }
            }
            requestAnimationFrame(_MOTOR);
        }
        _MOTOR();
    </script>
</body>
</html>
