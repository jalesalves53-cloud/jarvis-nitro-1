<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AETHER | V140 MASTER-KEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #L_O { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ALVO { font-family: 'Orbitron', sans-serif; font-size: clamp(60px, 15vw, 110px); letter-spacing: 20px; font-weight: 900; }
        .data-stream { position: absolute; top: 10px; left: 10px; font-size: 6px; color: #111; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="L_O">
        <div class="text-cyan-950 text-[6px] tracking-[30px] mb-10 uppercase">Security_Lock_V140</div>
        <input type="password" id="_PASS" placeholder="ENTER_KEY" class="bg-black border-b border-cyan-950 p-4 text-cyan-400 text-center w-80 mb-6 outline-none text-[12px] tracking-[15px]">
        <button onclick="_VAL()" class="text-cyan-800 text-[8px] tracking-[10px] hover:text-cyan-400 transition-all uppercase">Authorize_Access</button>
    </div>

    <div class="data-stream">CRYPT_KEY: jarvis102_ENABLED<br>ACER_NITRO_BOOST: ON</div>

    <div id="_STS" class="text-[8px] tracking-[25px] text-cyan-950 mb-12 uppercase">Autonomous_Neural_V140</div>
    <div id="_ALVO" class="ALVO opacity-0">---</div>
    <div id="_LOG" class="mt-12 text-[9px] text-gray-800 tracking-[10px] h-6 uppercase"></div>

    <script>
        const _SP = window.speechSynthesis;
        let _ON = false, _LS = -1, _LAST_SIGNAL = "", _POLARITY = 1;

        function _VAL() {
            if(document.getElementById('_PASS').value === "jarvis102") {
                document.getElementById('L_O').style.display = 'none';
                _ON = true; 
                _VOZ("Acesso Autorizado. Chave de segurança validada. Shadow Eye em operação.");
                _ENGINE();
            }
        }

        function _VOZ(t) {
            _SP.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; m.pitch = 0.35; m.rate = 2.0;
            _SP.speak(m);
        }

        function _ENGINE() {
            if(!_ON) return;
            const n = new Date(), s = n.getSeconds(), m = n.getMinutes();
            
            if(s !== _LS) {
                _LS = s;

                let corAlvo = (m % 2 === 0) ? "Preto" : "Vermelho";
                if(_POLARITY === -1) corAlvo = (corAlvo === "Preto") ? "Vermelho" : "Preto";

                if(s === 37) {
                    _LAST_SIGNAL = corAlvo;
                    _VOZ(`Entrar no ${corAlvo}.`);
                    document.getElementById('_ALVO').innerText = corAlvo;
                    document.getElementById('_ALVO').className = `ALVO opacity-100 ${corAlvo === 'Vermelho' ? 'text-red-700' : 'text-cyan-400'}`;
                }

                if(s === 12 && _LAST_SIGNAL !== "") {
                    _VOZ("Recalibrando pulso neural.");
                    document.getElementById('_LOG').innerText = "MONITORING_SEED_DRIFT";
                }

                if(s === 25) {
                    document.getElementById('_ALVO').className = "ALVO opacity-0";
                }
            }
            requestAnimationFrame(_ENGINE);
        }
    </script>
</body>
</html>
