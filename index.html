<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-PRIME | V106 ZERO DELAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --gold: #ffdd00; --bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        
        /* LOGIN CLEAN */
        #L_O { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .C_L { border: 1px solid rgba(0,242,255,0.1); padding: 40px; width: 350px; text-align: center; background: #050505; }
        input { background: #000; border: 1px solid #1a1a1a; color: var(--cyan); padding: 15px; margin: 10px 0; width: 100%; text-align: center; font-size: 12px; }
        
        /* HUD ESTÁTICO (SEM PISCAR) */
        .HUD { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; opacity: 0; transition: 1s; }
        .READY { opacity: 1 !important; }
        .TIMER_BG { font-size: 250px; font-weight: 800; color: var(--cyan); opacity: 0.02; position: absolute; z-index: -1; }
        .ALVO { font-family: 'Orbitron', sans-serif; font-size: clamp(40px, 10vw, 100px); letter-spacing: 15px; font-weight: 900; text-transform: uppercase; }
        
        /* PAINEL ADMIN */
        #A_P { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: #050505; border-left: 1px solid var(--cyan); z-index: 500; transition: 0.4s; padding: 30px; }
        .P_A { right: 0 !important; }
        
        .gold-text { color: var(--gold); }
        .cyan-text { color: var(--cyan); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="L_O">
        <div class="text-[8px] tracking-[10px] text-gray-700 mb-6 uppercase">System_Aether_106</div>
        <form onsubmit="event.preventDefault(); _VAL();" class="C_L">
            <input type="password" id="_PASS" placeholder="CHAVE_MESTRA">
            <button type="submit" class="mt-4 w-full border border-cyan-900 py-3 text-[9px] tracking-[4px] hover:bg-cyan-500 hover:text-black transition-all">CONECTAR</button>
        </form>
    </div>

    <div id="A_P">
        <h3 class="text-[10px] cyan-text mb-8 tracking-[4px]">COMMAND_CENTER</h3>
        <p class="text-[8px] text-gray-500 mb-2 uppercase">Voz_Delay (Segundos)</p>
        <input type="number" id="_VD" value="40.0" step="0.1">
        <button onclick="_SET()" class="w-full bg-cyan-900/10 border border-cyan-500 py-2 text-[9px] mt-4">SALVAR</button>
        <button onclick="_VAL_L()" class="w-full border border-red-900 py-2 text-[9px] mt-10 opacity-30">DESCONECTAR</button>
    </div>

    <div id="hud" class="HUD">
        <div id="_T_BG" class="TIMER_BG">00</div>
        
        <div class="absolute top-8 left-8 right-8 flex justify-between items-center">
            <div id="_TAG" class="text-[9px] tracking-[4px] cyan-text opacity-40">STANDBY</div>
            <div id="_SET_ICON" class="hidden cursor-pointer" onclick="document.getElementById('A_P').classList.toggle('P_A')">
                <svg class="w-5 h-5 text-cyan-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </div>
        </div>

        <div class="text-center">
            <div id="_STS" class="text-[9px] tracking-[10px] text-gray-700 mb-8 uppercase">Aguardando_Analise</div>
            <div id="_ALVO" class="ALVO opacity-0">---</div>
            <div id="_GALE" class="hidden mt-4 text-[11px] gold-text font-bold tracking-[4px] animate-pulse">PREPARAR GALE 1</div>
        </div>
    </div>

    <script>
        const _SP = window.speechSynthesis;
        let _ON = false, _LS = -1, _ADM = false;

        function _VAL() {
            const p = document.getElementById('_PASS').value;
            if(p === "jarvis102") { _ADM = true; _STR("COMANDANTE"); }
            else if(p === "recruta71") { _ADM = false; _STR("OPERADOR"); }
            else { alert("ACESSO NEGADO"); }
        }

        function _STR(t) {
            document.getElementById('L_O').style.display = 'none';
            document.getElementById('hud').classList.add('READY');
            document.getElementById('_TAG').innerText = t;
            if(_ADM) document.getElementById('_SET_ICON').classList.remove('hidden');
            _ON = true;
            _VOZ("Sistema Stark online. Filtros de luz aplicados.");
        }

        function _SET() { alert("DADOS SINCRONIZADOS"); document.getElementById('A_P').classList.remove('P_A'); }

        function _VOZ(t) {
            _SP.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; m.pitch = 0.6; m.rate = 1.5;
            _SP.speak(m);
        }

        // MOTOR DE ALTA VELOCIDADE (60 FPS)
        function _LOOP() {
            if(!_ON) { requestAnimationFrame(_LOOP); return; }
            
            const n = new Date(), s = n.getSeconds(), m = n.getMinutes();
            const delay = parseFloat(document.getElementById('_VD').value);
            document.getElementById('_T_BG').innerText = String(s).padStart(2, '0');

            if(s !== _LS) {
                _LS = s;
                const cor = (m % 2 === 0) ? "Preto" : "Vermelho";
                const sig = (m % 2 === 0 || m % 3 === 0);

                // Entrada Instantânea (Voz)
                if(s === Math.floor(delay) && sig) {
                    _VOZ(`Entrada no ${cor}`);
                    document.getElementById('_ALVO').innerText = cor;
                    document.getElementById('_ALVO').className = `ALVO opacity-100 ${cor === 'Vermelho' ? 'text-red-700' : 'cyan-text'}`;
                    document.getElementById('_STS').innerText = "STRIKE_CONFIRMED";
                }

                // G1 Preciso (Voz)
                if(s === 44 && sig) {
                    document.getElementById('_GALE').classList.remove('hidden');
                    _VOZ("Atenção, Gale 1");
                }

                // Reset Tático (Limpa a tela para a próxima)
                if(s === 25) {
                    document.getElementById('_ALVO').className = "ALVO opacity-0";
                    document.getElementById('_GALE').classList.add('hidden');
                    document.getElementById('_STS').innerText = "MONITORANDO_DADOS";
                }
            }
            requestAnimationFrame(_LOOP);
        }
        _LOOP();
    </script>
</body>
</html>
