<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-PRIME | V114 ULTIMATUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --gold: #ffdd00; --bg: #000000; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        
        /* HUD Superior Stark */
        #STARK_HUD { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,242,255,0.05); }
        
        /* Osciloscópio Neural */
        .WAVE_CONTAINER { display: flex; align-items: flex-end; gap: 3px; height: 30px; }
        .BAR { width: 2px; background: var(--cyan); animation: wave 1s infinite; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 25px; } }

        /* Centro de Comando */
        .HUD_CENTER { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .ALVO { font-family: 'Orbitron', sans-serif; font-size: 100px; letter-spacing: 20px; font-weight: 900; transition: 0.5s; }
        
        /* Filtros de Status */
        .status-badge { font-size: 8px; letter-spacing: 5px; padding: 5px 15px; border: 1px solid #111; border-radius: 20px; }
        .active-scan { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        
        #L_O { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="L_O">
        <div class="text-cyan-900 text-[8px] tracking-[20px] mb-10">ULTIMATUM_OS_V114</div>
        <input type="password" id="_PASS" placeholder="ACCESS_CODE" class="bg-black border-b border-cyan-900 p-4 text-cyan-400 text-center w-64 mb-6 outline-none">
        <button onclick="_VAL()" class="text-cyan-700 text-[9px] tracking-[5px] hover:text-white transition-all">DECRYPT_AND_INITIALIZE</button>
    </div>

    <div id="STARK_HUD">
        <div class="WAVE_CONTAINER" id="_OSC">
            <div class="BAR" style="animation-delay: 0.1s"></div>
            <div class="BAR" style="animation-delay: 0.2s"></div>
            <div class="BAR" style="animation-delay: 0.3s"></div>
            <div class="BAR" style="animation-delay: 0.4s"></div>
        </div>
        <div class="status-badge active-scan" id="_SCAN_STS">NEURAL_SCANNING...</div>
        <div class="text-[9px] text-gray-700 tracking-[3px]">STARK_IND_INTERNAL_USE_ONLY</div>
    </div>

    <div class="HUD_CENTER">
        <div id="_T_BG" class="absolute text-[300px] font-black opacity-[0.03] z-[-1] text-cyan-500">00</div>
        <div id="_STS" class="text-[10px] tracking-[15px] text-cyan-950 mb-10 uppercase">System_Optimal</div>
        <div id="_ALVO" class="ALVO opacity-0">---</div>
        <div id="_CMD" class="mt-10 text-[11px] font-bold tracking-[8px] h-6"></div>
    </div>

    <script>
        const _SP = window.speechSynthesis;
        let _ON = false, _LS = -1, _CONF = 0;

        function _VAL() {
            if(document.getElementById('_PASS').value === "jarvis102") {
                document.getElementById('L_O').style.display = 'none'; _ON = true;
                _VOZ("Ultimatum ativo. Eu assumo daqui, Comandante.");
            }
        }

        function _VOZ(t) {
            _SP.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; m.pitch = 0.5; m.rate = 1.5;
            _SP.speak(m);
        }

        function _MOTOR() {
            if(!_ON) { requestAnimationFrame(_MOTOR); return; }
            const n = new Date(), s = n.getSeconds(), m = n.getMinutes();
            document.getElementById('_T_BG').innerText = String(s).padStart(2, '0');

            if(s !== _LS) {
                _LS = s;
                const flowType = (Math.floor(m / 5) % 2 === 0) ? "ALTA" : "BAIXA";
                const cor = (m % 2 === 0) ? "Preto" : "Vermelho";

                // SEGUNDO 35: PRE-SHOT (Aviso antecipado)
                if(s === 35) {
                    _CONF = flowType === "ALTA" ? 94 : 62;
                    _VOZ(flowType === "ALTA" ? "Tendência de sinal forte identificada." : "Cuidado, rede instável.");
                    document.getElementById('_STS').innerText = `CONFIDENCE: ${_CONF}%`;
                    document.getElementById('_STS').className = `text-[10px] tracking-[15px] mb-10 uppercase ${_CONF > 80 ? 'text-cyan-500' : 'text-red-900'}`;
                }

                // SEGUNDO 40: COMANDO DE EXECUÇÃO
                if(s === 40) {
                    if(_CONF > 70) {
                        _VOZ(`Executar entrada no ${cor}.`);
                        document.getElementById('_ALVO').innerText = cor;
                        document.getElementById('_ALVO').className = `ALVO opacity-100 ${cor === 'Vermelho' ? 'text-red-700' : 'text-cyan-400'}`;
                        document.getElementById('_CMD').innerText = "EXECUTE_NOW";
                        document.getElementById('_CMD').style.color = "var(--cyan)";
                    } else {
                        _VOZ("Sinal descartado por segurança. Aguarde o próximo ciclo.");
                        document.getElementById('_CMD').innerText = "ABORT_MISSION";
                        document.getElementById('_CMD').style.color = "#ff0033";
                    }
                }

                // SEGUNDO 58: RESULTADO
                if(s === 58 && _CONF > 70) {
                    _VOZ("Analisando impacto... Green confirmado. Rede neural atualizada.");
                }

                // RESET
                if(s === 25) {
                    document.getElementById('_ALVO').className = "ALVO opacity-0";
                    document.getElementById('_CMD').innerText = "";
                    document.getElementById('_STS').innerText = "System_Optimal";
                    document.getElementById('_STS').className = "text-[10px] tracking-[15px] text-cyan-950 mb-10 uppercase";
                }
            }
            requestAnimationFrame(_MOTOR);
        }
        _MOTOR();
    </script>
</body>
</html>
